server {
    listen 3005;
    listen [::]:3005;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml;

    # SPA fallback: unknown routes are handled by React Router (client-side).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted build assets can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Keep entry point + crawler files fresh so redeploys and SEO/GEO updates
    # are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /robots.txt {
        add_header Cache-Control "no-cache";
    }
    location = /sitemap.xml {
        add_header Cache-Control "no-cache";
    }

    # Basic hardening.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
