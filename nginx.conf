server {
    listen 3005;
    listen [::]:3005;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml;

    # Enforce one trailing-slash convention (matches canonicalFor() in
    # src/data/seo.js: "/" keeps its slash, every other path has none).
    # Without this, try_files below would silently serve identical content for
    # both /faq and /faq/ (no external redirect), so both return 200 — a
    # duplicate-URL problem search engines penalize.
    #
    # Must match against $request_uri, NOT $uri: try_files' directory->index
    # fallback ($uri/) performs an internal redirect that appends a trailing
    # slash and re-runs this block. Matching on $uri would then fire on that
    # internally-rewritten URI too, redirecting the slash right back on and
    # causing an infinite 301 loop between /faq and /faq/. $request_uri is the
    # original client request line and is untouched by internal redirects.
    if ($request_uri ~ ^(/.+)/(\?.*)?$) {
        return 301 $1$2;
    }

    # SPA fallback: unknown routes are handled by React Router (client-side).
    # $uri.html (not $uri/) matches prerender.js's flat-file output
    # (dist/faq.html, not dist/faq/index.html) — no directory ever exists at
    # these paths, so nginx never auto-redirects to add a trailing slash.
    location / {
        try_files $uri $uri.html /index.html;
    }

    # Fingerprinted build assets can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Keep entry point + crawler files fresh so redeploys and SEO/GEO updates
    # are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /robots.txt {
        add_header Cache-Control "no-cache";
    }
    location = /sitemap.xml {
        add_header Cache-Control "no-cache";
        # Force the MIME type regardless of the base image's mime.types
        # mapping (some map .xml to text/xml).
        types { }
        default_type application/xml;
    }

    # Basic hardening.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
