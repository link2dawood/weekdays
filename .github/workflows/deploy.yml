name: Build and Deploy

# Build the container image on GitHub's runners, push it to GitHub Container
# Registry (GHCR), then have the server simply PULL and run it. The server does
# no building — all the load stays on GitHub Actions.

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild so date-dependent content (current week number, sitemap
    # <lastmod>, etc.) never goes stale between code pushes — the single
    # highest-impact, slowest-noticed failure mode for a site whose entire
    # content is "what week is it". Runs the same build+deploy jobs as a push
    # to main, just on a timer instead of a commit.
    #
    # GitHub Actions cron is UTC-only with no IANA timezone support, so a
    # fixed cron line can't literally say "00:05 Europe/Helsinki" year-round.
    # 22:05 UTC is chosen because it's always AFTER local midnight in
    # Helsinki regardless of DST: 00:05 EET in winter (UTC+2), 01:05 EEST in
    # summer (UTC+3). That's what actually matters here — a rebuild landing
    # an hour later than nominal in summer is harmless, but one firing before
    # local midnight would ship yesterday's week number.
    - cron: "5 22 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CONTAINER_NAME: viikkonro
  APP_PORT: "3005"

jobs:
  # ── 1. Build the image and push it to GHCR ─────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: img
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          build-args: |
            VITE_WEB3FORMS_ACCESS_KEY=${{ secrets.VITE_WEB3FORMS_ACCESS_KEY }}
            SITE_ORIGIN=${{ vars.SITE_ORIGIN || 'https://viikkonro.fi' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image: ${{ steps.img.outputs.name }}

  # ── 2. Tell the server to pull the new image and restart ───────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (pull & run only — no build on the server)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }} # optional; defaults to 22 if empty
          script: |
            set -e
            IMAGE="${{ needs.build-and-push.outputs.image }}:latest"
            CONTAINER="${{ env.CONTAINER_NAME }}"

            # Authenticate to GHCR only if a token is provided. A PRIVATE package
            # (the default) needs this; a PUBLIC package pulls without login.
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            fi

            docker pull "$IMAGE"
            docker rm -f "$CONTAINER" 2>/dev/null || true
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 3005:3005 \
              "$IMAGE"

            # Clean up old dangling images to save disk.
            docker image prune -f

      # ── 3. Tell Search Console the sitemap is fresh (F-08) ─────────────────
      # Best-effort only: this must never fail the deploy. The site is already
      # live at this point regardless of whether Google gets pinged, and
      # Google re-crawls known sitemaps on its own schedule anyway — a missed
      # submission here is low-stakes, unlike a failed deploy.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Submit sitemap to Search Console
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "::warning::GCP_SA_KEY secret not set — skipping Search Console sitemap submission (see F-07)."
            exit 0
          fi
          # Submits sitemap.xml itself, not a sitemap index: this site has no
          # index-of-child-sitemaps structure (one flat file, well under the
          # 50,000-URL sitemap limit), so there's nothing else to submit.
          node src/cli.js submit-sitemap
